name: Deploy Docker Images

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build frontend image
        uses: docker/build-push-action@v4
        with:
          context: ${{ github.workspace }}/workspace/54906719-355d-42f7-b07b-d12ded430ffe/developer/frontend
          file: ${{ github.workspace }}/workspace/54906719-355d-42f7-b07b-d12ded430ffe/ops/Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/enterprise-admin-frontend:${{ github.sha }}

      - name: Build backend image
        uses: docker/build-push-action@v4
        with:
          context: ${{ github.workspace }}/workspace/54906719-355d-42f7-b07b-d12ded430ffe/developer/backend
          file: ${{ github.workspace }}/workspace/54906719-355d-42f7-b07b-d12ded430ffe/ops/Dockerfile.backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/enterprise-admin-backend:${{ github.sha }}
